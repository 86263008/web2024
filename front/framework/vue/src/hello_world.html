<script src="vue.global.js"></script>

<!-- 1. 定义View -->
<div id="app">{{ message }}</div>

<script>
  const { createApp, ref } = Vue

  // 3. 定义ViewModel
  createApp({
    setup() {
      const message = ref('Hello vue!')
      // 2. 定义Model
      return {
        message
      }
    }
  }).mount('#app')
</script>
